<!DOCTYPE html>
<html>
<head>
<title>Control de Acceso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
margin:0;
text-align:center;
}

.header{
background:white;
padding:10px 0;
border-bottom:2px solid #0b3d91;
box-shadow:0 2px 6px rgba(0,0,0,.05);
}

.header img{
width:55%;
max-width:200px;
}

.container{
background:white;
width:90%;
max-width:380px;
margin:30px auto;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
margin-bottom:10px;
color:#0b3d91;
font-weight:700;
font-size:24px;
}

.mensaje{
font-size:13px;
color:#444;
margin-bottom:15px;
min-height:20px;
}

input{
width:80%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:18px;
outline:none;
transition:.2s;
}

input:focus{
border-color:#0b3d91;
box-shadow:0 0 0 2px rgba(11,61,145,.1);
}

.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
color:white;
font-size:15px;
margin-bottom:12px;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:scale(1.02);
}

.ingreso{
background:#0b3d91;
}

.ingreso:hover{
background:#092f6f;
}

.footer{
font-size:11px;
margin-top:20px;
line-height:1.4;
}

.departamento{
color:#0b3d91;
font-weight:700;
}

.corporacion{
color:#000;
font-weight:700;
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

<h2>Control de Acceso</h2>

<div class="mensaje" id="mensaje"></div>

<input id="docInput" placeholder="Número de documento">

<button class="btn ingreso" onclick="irIngreso()">Ingreso</button>

<div class="footer">
<div class="departamento">
DEPARTAMENTO DE CONTROL INTERNO DE SEGURIDAD E INFRAESTRUCTURA
</div>

<div class="corporacion">
CORPORACION COLEGIO INTERNACIONAL ALTAMIRA
</div>
</div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data = [];

async function cargarDatos() {
try{
const res = await fetch(SHEET_URL);
const text = await res.text();
const json = JSON.parse(text.substring(47).slice(0,-2));

data = json.table.rows.map(r => {
const c = (r.c || []).map(x => x ? x.v : "");

return {
timestamp:c[0],
tipo:limpiarTexto(c[1]),
doc:limpiarTexto(c[2]),
nombre:limpiarTexto(c[3]),
rol:limpiarTexto(c[4]),
entidad:limpiarTexto(c[5]),
placa:limpiarTexto(c[6]),
contacto:limpiarTexto(c[8]),
emergencia:limpiarTexto(c[9]),
parentesco:normalizarParentesco(c[11])
};

});

}catch(e){
alert("Error cargando base de datos");
}
}

window.onload = cargarDatos;

function limpiarTexto(texto){
return String(texto || "").replace(/\s+/g," ").trim();
}

function limpiarDoc(doc){
return String(doc || "").replace(/\s+/g,"").trim();
}

function normalizarParentesco(valor){

const v = limpiarTexto(valor).toLowerCase();

if(v.includes("espos")) return "Esposa/o";
if(v.includes("hij")) return "Hija/o";
if(v.includes("herman")) return "Hermana/o";
if(v.includes("amig")) return "Amiga/o";

return "Otros:";
}

function getUser(){

const doc = limpiarDoc(document.getElementById("docInput").value);

if(!doc) return null;

return data.find(u => limpiarDoc(u.doc) === doc);
}

function yaIngresoHoy(doc){

const hoy = new Date();

return data.some(u => {

if(limpiarDoc(u.doc) !== limpiarDoc(doc)) return false;

const fecha = new Date(u.timestamp);

return (
fecha.getDate() === hoy.getDate() &&
fecha.getMonth() === hoy.getMonth() &&
fecha.getFullYear() === hoy.getFullYear()
);

});

}

// MENSAJE DINAMICO
document.getElementById("docInput").addEventListener("input",function(){

const user = getUser();
const mensaje = document.getElementById("mensaje");
const doc = this.value.trim();

if(!doc){
mensaje.innerText="";
return;
}

if(yaIngresoHoy(doc)){
mensaje.innerText="Este documento ya registró ingreso hoy.";
return;
}

if(user){
const nombre = user.nombre.split(" ")[0];
mensaje.innerText="Bienvenido nuevamente, " + nombre + " 👋";
}else{
mensaje.innerText="Bienvenido a nuestras instalaciones, por favor registre sus datos 😊";
}

});

// INGRESO
function irIngreso(){

const input = document.getElementById("docInput").value.trim();

if(!input){
alert("Debe ingresar un número de documento");
return;
}

if(yaIngresoHoy(input)){
alert("Este documento ya registró ingreso hoy");
return;
}

const user = getUser();

const form = "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/viewform";

if(!user){
window.location.href = form;
return;
}

const url =
form +
"?usp=pp_url" +
"&entry.2083119061=" + encodeURIComponent(user.tipo) +
"&entry.311902120=" + encodeURIComponent(user.doc) +
"&entry.1899230705=" + encodeURIComponent(user.nombre) +
"&entry.477144471=" + encodeURIComponent(user.contacto) +
"&entry.2145689969=" + encodeURIComponent(user.rol) +
"&entry.1527361506=" + encodeURIComponent(user.entidad) +
"&entry.1268448003=" + encodeURIComponent(user.placa) +
"&entry.1316902717=" + encodeURIComponent(user.emergencia) +
"&entry.539345216=" + encodeURIComponent(user.parentesco);

window.location.href = url;
}

document.getElementById("docInput").addEventListener("keypress",function(e){
if(e.key === "Enter") irIngreso();
});

</script>

</body>
</html>
