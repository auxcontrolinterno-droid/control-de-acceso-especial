<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data = [];

async function cargarDatos() {
try{
const res = await fetch(SHEET_URL);
const text = await res.text();
const json = JSON.parse(text.substring(47).slice(0,-2));

data = json.table.rows.map(r => {
const c = (r.c || []).map(x => x ? x.v : "");

return {
timestamp:c[0],
tipo:limpiarTexto(c[1]),
doc:limpiarTexto(c[2]),
nombre:limpiarTexto(c[3]),
rol:limpiarTexto(c[4]),
entidad:limpiarTexto(c[5]),
placa:limpiarTexto(c[6]),
contacto:limpiarTexto(c[8]),
emergencia:limpiarTexto(c[9]),
parentesco:normalizarParentesco(c[11])
};

});

}catch(e){
alert("Error cargando base de datos");
}
}

window.onload = cargarDatos;

function limpiarTexto(texto){
return String(texto || "").replace(/\s+/g," ").trim();
}

function limpiarDoc(doc){
return String(doc || "").replace(/\s+/g,"").trim();
}

function normalizarParentesco(valor){

const v = limpiarTexto(valor).toLowerCase();

if(v.includes("espos")) return "Esposa/o";
if(v.includes("hij")) return "Hija/o";
if(v.includes("herman")) return "Hermana/o";
if(v.includes("amig")) return "Amiga/o";

return "Otros:";
}

function getUser(){

const doc = limpiarDoc(document.getElementById("docInput").value);

if(!doc) return null;

return data.find(u => limpiarDoc(u.doc) === doc);
}

// 🔥 BLOQUEO 1 VEZ POR DIA
function yaIngresoHoy(doc){

const documento = limpiarDoc(doc);

const hoy = new Date();
const dia = hoy.getDate();
const mes = hoy.getMonth();
const anio = hoy.getFullYear();

return data.some(u => {

if(limpiarDoc(u.doc) !== documento) return false;
if(!u.timestamp) return false;

const fecha = new Date(u.timestamp);

return (
fecha.getDate() === dia &&
fecha.getMonth() === mes &&
fecha.getFullYear() === anio
);

});

}

// MENSAJE DINAMICO
document.getElementById("docInput").addEventListener("input",function(){

const mensaje = document.getElementById("mensaje");
const user = getUser();
const doc = this.value.trim();

if(!doc){
mensaje.innerText="";
return;
}

// SI YA INGRESO HOY
if(yaIngresoHoy(doc)){
mensaje.innerText="⚠️ Este documento ya registró ingreso hoy.";
return;
}

if(user){
const nombre = user.nombre.split(" ")[0];
mensaje.innerText="Bienvenido nuevamente, " + nombre + " 👋";
}else{
mensaje.innerText="Bienvenido a nuestras instalaciones, por favor registre sus datos 😊";
}

});

// INGRESO
function irIngreso(){

const input = document.getElementById("docInput").value.trim();

if(!input){
alert("Debe ingresar un número de documento");
return;
}

// BLOQUEO
if(yaIngresoHoy(input)){
alert("Este documento ya fue registrado hoy.");
return;
}

const user = getUser();

const form = "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/viewform";

if(!user){
window.location.href = form;
return;
}

const url =
form +
"?usp=pp_url" +
"&entry.2083119061=" + encodeURIComponent(user.tipo) +
"&entry.311902120=" + encodeURIComponent(user.doc) +
"&entry.1899230705=" + encodeURIComponent(user.nombre) +
"&entry.477144471=" + encodeURIComponent(user.contacto) +
"&entry.2145689969=" + encodeURIComponent(user.rol) +
"&entry.1527361506=" + encodeURIComponent(user.entidad) +
"&entry.1268448003=" + encodeURIComponent(user.placa) +
"&entry.1316902717=" + encodeURIComponent(user.emergencia) +
"&entry.539345216=" + encodeURIComponent(user.parentesco);

window.location.href = url;
}

document.getElementById("docInput").addEventListener("keypress",function(e){
if(e.key === "Enter") irIngreso();
});

</script>
