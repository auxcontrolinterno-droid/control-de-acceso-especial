<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data = [];

async function cargarDatos() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0, -2));

    data = json.table.rows.map(r => {
      const c = (r.c || []).map(x => x ? x.v : "");

      return {
        timestamp: c[0],
        tipo: limpiar(c[1]),
        doc: limpiar(c[2]),
        nombre: limpiar(c[3]),
        rol: limpiar(c[4]),
        entidad: limpiar(c[5]),
        placa: limpiar(c[6]),
        contacto: limpiar(c[8]),
        emergencia: limpiar(c[9]),
        destino: limpiar(c[10]),
        parentesco: limpiar(c[11])
      };
    });

  } catch (error) {
    console.log(error);
    alert("Error cargando base de datos");
  }
}

function limpiar(txt){
  return String(txt || "").trim();
}

function getUser(doc){
  return data.find(x => limpiar(x.doc) === limpiar(doc));
}

function esHoy(fecha){

  const hoy = new Date();
  const f = new Date(fecha);

  return (
    f.getDate() === hoy.getDate() &&
    f.getMonth() === hoy.getMonth() &&
    f.getFullYear() === hoy.getFullYear()
  );
}

function yaIngresoHoy(doc){
  return data.some(x => limpiar(x.doc) === limpiar(doc) && esHoy(x.timestamp));
}

// MENSAJE
document.getElementById("docInput").addEventListener("input", function(){

  const doc = this.value.trim();
  const mensaje = document.getElementById("mensaje");
  const btn = document.getElementById("btnIngreso");

  mensaje.innerText = "";
  btn.disabled = false;

  if(!doc) return;

  const user = getUser(doc);

  if(yaIngresoHoy(doc)){
    mensaje.innerText = "Este documento ya registró ingreso hoy.";
    btn.disabled = true;
    return;
  }

  if(user){
    mensaje.innerText = "Bienvenido nuevamente, " + user.nombre.split(" ")[0] + " 👋";
  } else {
    mensaje.innerText = "Bienvenido. Puede registrar su ingreso.";
  }

});

// INGRESO
function irIngreso(){

  const doc = document.getElementById("docInput").value.trim();

  if(!doc){
    alert("Debe ingresar documento");
    return;
  }

  if(yaIngresoHoy(doc)){
    alert("Este documento ya fue registrado hoy");
    return;
  }

  const user = getUser(doc);

  const form = "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/viewform";

  if(!user){
    window.location.href = form;
    return;
  }

  const url =
    form +
    "?usp=pp_url" +
    "&entry.2083119061=" + encodeURIComponent(user.tipo) +
    "&entry.311902120=" + encodeURIComponent(user.doc) +
    "&entry.1899230705=" + encodeURIComponent(user.nombre) +
    "&entry.477144471=" + encodeURIComponent(user.contacto) +
    "&entry.2145689969=" + encodeURIComponent(user.rol) +
    "&entry.1527361506=" + encodeURIComponent(user.entidad) +
    "&entry.1268448003=" + encodeURIComponent(user.placa) +
    "&entry.1316902717=" + encodeURIComponent(user.emergencia) +
    "&entry.539345216=" + encodeURIComponent(user.parentesco);

  window.location.href = url;
}

window.onload = cargarDatos;

document.getElementById("docInput").addEventListener("keypress", function(e){
  if(e.key === "Enter") irIngreso();
});

</script>
